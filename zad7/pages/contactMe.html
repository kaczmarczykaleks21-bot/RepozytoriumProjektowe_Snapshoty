<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../stylesheets/contactMe.css" />
    <script src="../js/contactForm.js" defer></script>
    <script
      src="https://kit.fontawesome.com/ac32e74fe2.js"
      crossorigin="anonymous"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Share+Tech&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <title>/contactMe</title>
  </head>
  <body>
    <main>
      <div class="form-container">
        <h2>Formularz kontaktowy</h2>

        <form onsubmit="sendMessage(event)">
          <input type="text" placeholder="Twoje imię" required />
          <input type="text" placeholder="Twoje nazwisko" required />
          <input type="email" placeholder="Email" required />
          <textarea rows="4" placeholder="Wiadomość" required></textarea>
          <button type="submit">Wyślij</button>
        </form>
      </div>
    </main>
  </body>
</html>
